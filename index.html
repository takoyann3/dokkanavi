<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どっかナビ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>どっかナビ</h1>

<div class="controls">
  <label>半径(km):
    <input type="number" id="radius" value="1" min="0.1" step="0.1">
  </label>
  <button onclick="generateTarget()">新規作成</button>
  <span id="resetInfo"></span>
</div>

<div id="arrowContainer">
  <div id="arrow"></div>
</div>

<div id="direction">--</div>
<div id="distance">-- m</div>
<div id="goalCount">Goal: 0</div>

<button onclick="toggleTheme()">モード切替</button>

<script src="script.js"></script>
</body>
</html>
